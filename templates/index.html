<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchMovies - Stream Free Movies & TV Shows</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Premium WatchMovies PK Hover Effect */
        .movie-card {
            transition: transform 400ms cubic-bezier(0.25, 0.8, 0.25, 1), z-index 0s linear;
            border: 1px solid #1a1a1a;
        }
        .movie-card:hover {
            transform: scale(1.25);
            z-index: 50;
            border-color: #d97706; /* Golden border on hover */
            box-shadow: 0 20px 40px rgba(217, 119, 6, 0.2); /* Golden subtle glow */
            transition-delay: 300ms;
        }
        .hover-details {
            display: none;
            opacity: 0;
            border-top: 2px solid #dc2626; /* Red top border on detail popup */
        }
        .movie-card:hover .hover-details {
            display: block;
            opacity: 1;
            transition-delay: 300ms;
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <header id="mainHeader" class="fixed top-0 left-0 w-full flex items-center justify-between px-6 py-4 z-50 transition-colors duration-500 bg-transparent border-b border-white/5">
        <div class="text-2xl md:text-3xl font-black tracking-wider uppercase">
            <span class="text-red-600">Watch</span><span class="text-amber-500">Movies</span>
        </div>
        
        <div class="relative w-72">
            <input type="text" id="searchInput" onkeyup="searchMedia()" placeholder="Search movies or series..." 
                   class="w-full bg-zinc-900/90 text-white text-sm px-4 py-2 rounded-md border border-zinc-700 focus:outline-none focus:border-amber-500 shadow-inner transition-all placeholder-gray-500">
        </div>
    </header>

    <section id="heroBanner" class="relative w-full h-[85vh] bg-cover bg-center flex items-center px-12 transition-all duration-700">
        <div class="absolute inset-0 bg-gradient-to-r from-black/90 via-black/50 to-transparent z-10"></div>
        <div class="relative z-20 max-w-2xl mt-12">
            <span class="text-xs font-bold uppercase tracking-widest text-amber-500 bg-amber-500/10 px-3 py-1 rounded border border-amber-500/30 mb-4 inline-block">Featured Spotlight</span>
            <h1 id="heroTitle" class="text-4xl md:text-6xl font-extrabold mb-4 text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)]">Loading Title...</h1>
            <p id="heroOverview" class="text-gray-300 text-sm md:text-base line-clamp-3 mb-6">Loading dynamic overview from database automation framework...</p>
            <div class="flex gap-4">
                <button id="heroPlayBtn" class="bg-amber-500 text-black font-black px-8 py-3 rounded shadow-lg shadow-amber-500/20 hover:bg-amber-600 transition transform hover:scale-105 flex items-center gap-2">
                    <span class="text-lg">▶</span> WATCH NOW
                </button>
            </div>
        </div>
        <div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-[#0a0a0a] to-transparent z-10"></div>
    </section>

    <main class="relative z-30 px-6 md:px-12 -mt-24 space-y-12 pb-24">

        <div id="playerSection" class="hidden transition-all duration-500 bg-zinc-950 p-4 rounded-lg border border-red-600/30 shadow-2xl shadow-red-600/5">
            <div class="flex justify-between items-center mb-3 border-b border-zinc-800 pb-2">
                <h3 id="playingTitle" class="text-xl font-bold text-amber-500 flex items-center gap-2">
                    <span class="animate-pulse inline-block w-2.5 h-2.5 rounded-full bg-red-600"></span> Now Streaming
                </h3>
                <button onclick="closePlayer()" class="text-gray-400 hover:text-red-500 font-bold transition-colors text-sm bg-zinc-900 px-3 py-1 rounded">✕ Close Player</button>
            </div>
            <div class="relative w-full aspect-video rounded overflow-hidden shadow-2xl border border-zinc-800">
                <iframe id="apiPlayer" src="" class="absolute inset-0 w-full h-full border-0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </div>

        <div id="searchRowContainer" class="hidden">
            <h2 class="text-xl font-bold text-amber-500 mb-1 tracking-wide">Search Results</h2>
            <div class="w-16 h-1 bg-red-600 mb-4"></div>
            <div class="overflow-x-auto no-scrollbar py-4">
                <div id="searchResults" class="flex gap-4"></div>
            </div>
        </div>

        <div>
            <h2 class="text-xl font-bold text-white mb-1 tracking-wide">Trending <span class="text-red-600">Movies</span></h2>
            <div class="w-16 h-0.5 bg-amber-500 mb-4"></div>
            <div class="overflow-x-auto no-scrollbar py-4">
                <div id="trendingMovies" class="flex gap-4"></div>
            </div>
        </div>

        <div>
            <h2 class="text-xl font-bold text-white mb-1 tracking-wide">Popular <span class="text-red-600">TV Series</span></h2>
            <div class="w-16 h-0.5 bg-amber-500 mb-4"></div>
            <div class="overflow-x-auto no-scrollbar py-4">
                <div id="trendingTV" class="flex gap-4"></div>
            </div>
        </div>
    </main>

    <script>
        // LIVE SECURE KEY USED
        const TMDB_API_KEY = "82e880c89dbf119b940e034ed32a3498"; 
        const BASE_URL = "https://api.themoviedb.org/3";
        const IMG_URL = "https://image.tmdb.org/t/p/w500";
        const BACKDROP_URL = "https://image.tmdb.org/t/p/original";

        // Main Lifecycle Initialization
        document.addEventListener('DOMContentLoaded', () => {
            fetchTrendingMedia('movie', 'trendingMovies');
            fetchTrendingMedia('tv', 'trendingTV');
            setupHeroBanner();
            
            // Sticky Header Fade Control
            window.addEventListener('scroll', () => {
                const header = document.getElementById('mainHeader');
                if (window.scrollY > 50) header.classList.add('bg-[#0a0a0a]');
                else header.classList.remove('bg-[#0a0a0a]');
            });
        });

        // Fetch Data Smoothly from TMDB API
        async function fetchTrendingMedia(type, targetContainerId) {
            try {
                const response = await fetch(`${BASE_URL}/trending/${type}/week?api_key=${TMDB_API_KEY}`);
                const data = await response.json();
                renderRow(data.results, targetContainerId, type);
            } catch (error) {
                console.error("Failed fetching media row data:", error);
            }
        }

        // Setup dynamic Hero Banner setup
        async function setupHeroBanner() {
            try {
                const response = await fetch(`${BASE_URL}/trending/movie/day?api_key=${TMDB_API_KEY}`);
                const data = await response.json();
                if(data.results.length > 0) {
                    const topMovie = data.results[Math.floor(Math.random() * 5)]; 
                    document.getElementById('heroBanner').style.backgroundImage = `linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.3)), url('${BACKDROP_URL}${topMovie.backdrop_path}')`;
                    document.getElementById('heroTitle').innerText = topMovie.title || topMovie.name;
                    document.getElementById('heroOverview').innerText = topMovie.overview;
                    document.getElementById('heroPlayBtn').onclick = () => startStreaming('movie', topMovie.id, topMovie.title);
                }
            } catch (e) { console.error("Hero setup failed", e); }
        }

        // Render Cards into rows with dynamic hover injection
        function renderRow(items, containerId, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            items.forEach(item => {
                if(!item.poster_path) return;
                
                const title = item.title || item.name;
                const releaseYear = (item.release_date || item.first_air_date || '').split('-')[0] || '2026';
                const rating = item.vote_average ? item.vote_average.toFixed(1) : '7.5';

                const card = document.createElement('div');
                card.className = "movie-card relative flex-shrink-0 w-48 aspect-[16/9] bg-zinc-900 rounded cursor-pointer overflow-visible";
                card.onclick = () => startStreaming(type, item.id, title);
                
                card.innerHTML = `
                    <img src="${IMG_URL}${item.backdrop_path ? item.backdrop_path : item.poster_path}" class="w-full h-full object-cover rounded shadow-md">
                    <div class="hover-details absolute top-[98%] left-0 w-full bg-zinc-950 p-3 rounded-b-md shadow-2xl z-50 border-x border-b border-amber-500/30">
                        <div class="flex gap-2 mb-2 items-center">
                            <span class="text-amber-500 font-black text-xs">★ ${rating}</span>
                            <span class="border border-red-600/50 text-[9px] px-1 text-red-500 bg-red-600/10 font-bold rounded">HD</span>
                            <span class="text-gray-400 text-xs ml-auto">${releaseYear}</span>
                        </div>
                        <div class="text-xs font-bold truncate text-white hover:text-amber-500 transition-colors">${title}</div>
                        <div class="text-[10px] text-green-400 font-semibold mt-1">⚡ ${Math.floor(rating * 10)}%
